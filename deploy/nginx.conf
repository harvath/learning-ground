# Minimal nginx site for the Learning Ground static site.
# Serves the repo root directly — the relative links in the HTML
# (../assets, ../reference, lessons/…) resolve as-is.
#
# Install path on the Ubuntu box:
#   /etc/nginx/sites-available/learning-ground
# then symlink into sites-enabled (see deploy/README.md).

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # >>> point this at wherever the repo lives on the Ubuntu machine <<<
    root /var/www/learning-ground;
    index index.html;

    # Never serve dotfiles (.git/, .claude/, etc.)
    location ~ /\. {
        deny all;
        return 404;
    }

    location / {
        try_files $uri $uri/ =404;
        autoindex off;
    }

    # Don't cache HTML so edits show up on refresh; cache static assets briefly.
    location ~* \.html?$    { add_header Cache-Control "no-cache"; }
    location ~* \.(css|js)$ { add_header Cache-Control "max-age=300"; }

    # Correct charset for the Japanese content.
    charset utf-8;
}
